<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deadlock Patch Meta Heatmap</title>
  <script src="./vendor/echarts.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap');

    :root {
      color-scheme: dark;
      --bg: #070b17;
      --surface: #101938;
      --surface-2: #0d1430;
      --text: #e8efff;
      --muted: #93a4c4;
      --accent: #22d3ee;
      --accent-2: #f59e0b;
      --border: #2a3c70;
    }

    body {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -20%, rgba(34, 211, 238, 0.12), transparent),
        radial-gradient(1000px 500px at 95% -10%, rgba(245, 158, 11, 0.09), transparent),
        var(--bg);
    }

    .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 14px 32px; }

    h1 {
      margin: 0;
      font-family: 'Newsreader', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0.2px;
      text-wrap: balance;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .row { display:flex; gap:14px; flex-wrap:wrap; }

    .card {
      background: linear-gradient(160deg, rgba(19,31,67,.94), rgba(13,20,48,.95));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 24px rgba(0,0,0,0.22);
    }

    #chart {
      width: 100%;
      height: 640px;
      border-radius: 10px;
      background: repeating-linear-gradient(
        0deg,
        rgba(147,164,196,0.03),
        rgba(147,164,196,0.03) 1px,
        transparent 1px,
        transparent 22px
      );
    }

    #details { min-height: 180px; white-space: pre-wrap; }

    select, input {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid #35508b;
      border-radius: 10px;
      padding: 8px 10px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .muted { color: var(--muted); }
    .hero-line { display:flex; align-items:center; gap:10px; margin:8px 0; }
    .hero-line img { width:44px; height:44px; object-fit:cover; border-radius:8px; border:1px solid #3a4f83; }
    .hero-name { font-weight:700; font-size:1.02rem; }

    #details {
      font-size: 0.95rem;
      line-height: 1.55;
      color: #d6e2ff;
    }

    #details .muted {
      color: #9bb0d8;
      font-size: 0.88rem;
    }

    #details ul {
      margin: 10px 0 0;
      padding-left: 18px;
    }

    #details li {
      margin: 3px 0;
    }

    .kpi { min-width:220px; flex:1; }
    .kpi .label { font-size:11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .kpi .value { font-size:22px; font-weight:700; color: #f3f7ff; }

    .legend { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .dot { width:12px; height:12px; border-radius:2px; display:inline-block; }
    .pill { display:inline-block; padding:2px 8px; border:1px solid #37508e; border-radius:999px; margin-right:6px; font-size:11px; color:#b7ccf5; background:rgba(34,211,238,.08); }
    .legend-bar { width:240px; height:10px; border-radius:999px; border:1px solid #2f467c; background:linear-gradient(90deg,#7f1d1d,#b91c1c,#d9480f,#334155,#14b8a6,#22c55e,#16a34a); }

    @media (max-width: 760px) {
      .wrap { padding: 14px 10px 24px; }
      .card { padding: 10px; border-radius: 12px; }
      .kpi { min-width: 100%; }
      #details { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Deadlock Patch Meta Heatmap</h1>
    <p class="sub">Visual patch impact by hero across updates</p>
    <div class="row">
      <div class="card" style="flex:1">
        <label>Search hero: <input id="search" placeholder="e.g. Warden" /></label>
      </div>
      <div class="card" style="width:280px">
        <label>Tag filter:
          <select id="tag">
            <option value="all">all</option>
            <option value="damage">damage</option>
            <option value="survivability">survivability</option>
            <option value="utility">utility</option>
            <option value="economy">economy</option>
          </select>
        </label>
      </div>
    </div>

    <div class="row" style="margin-top:16px">
      <div class="card kpi"><div class="label">Visible heroes</div><div id="kpiHeroes" class="value">-</div></div>
      <div class="card kpi"><div class="label">Most buffed (current filters)</div><div id="kpiBuffed" class="value">-</div></div>
      <div class="card kpi"><div class="label">Most nerfed (current filters)</div><div id="kpiNerfed" class="value">-</div></div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="legend">
        <span class="muted">How to read:</span>
        <span class="legend-bar"></span>
        <span><span class="dot" style="background:#7f1d1d"></span> strong nerf</span>
        <span><span class="dot" style="background:#d9480f"></span> nerf</span>
        <span><span class="dot" style="background:#334155"></span> neutral</span>
        <span><span class="dot" style="background:#14b8a6"></span> buff</span>
        <span><span class="dot" style="background:#16a34a"></span> strong buff</span>
        <span class="muted">(Click any cell for exact notes)</span>
      </div>
    </div>

    <div class="card" style="margin-top:16px"><div id="chart"></div></div>
    <div class="card" style="margin-top:16px">
      <h3>Selection details</h3>
      <div id="details" class="muted">Click a cell to inspect changes.</div>
    </div>
  </div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
